<main>
  <h1>{{ title }}</h1>
  {{#if message}}
    <p class="notice">{{ message }}</p>
  {{/if}}
  <form method="post" action="?/login">
    <label>
      Email
      <input name="email" type="email">
    </label>
    <label>
      Password
      <input name="password" type="password">
    </label>
    <button>Login</button>
  </form>
</main>
